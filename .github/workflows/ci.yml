name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend lint + test ──────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight deps only (no torch/colpali in CI)
        working-directory: backend
        run: |
          pip install fastapi pydantic pydantic-settings ruff

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --ignore E501

  # ── Frontend lint + build ────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key
          VITE_BACKEND_URL: http://localhost:8000
        run: npm run build

  # ── Docker build check ───────────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t doc-intel-backend ./backend

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.prod -t doc-intel-frontend ./frontend